name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract Alpine tag from Dockerfile
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          FROM_LINE="$(grep -m1 -E '^FROM ' Dockerfile)"
          BASE_TAG="$(echo "$FROM_LINE" | sed -E 's/^FROM[[:space:]]+[^:]+:([^[:space:]]+).*/\1/')"
          ALPINE_VER="$(echo "$BASE_TAG" | sed -nE 's/^([0-9]+\.[0-9]+).*/\1/p')"
          echo "base_tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
          echo "alpine_ver=$ALPINE_VER" >> "$GITHUB_OUTPUT"
          echo "Detected: base_tag=$BASE_TAG alpine_ver=$ALPINE_VER"

      # 1) Login DHI
      - name: Login to DHI registry (dhi.io)
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2) Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/marp-presentation-builder:latest
            ${{ secrets.DOCKER_USERNAME }}/marp-presentation-builder:alpine${{ steps.ver.outputs.alpine_ver }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      security-events: write
    steps:
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/marp-presentation-builder:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Run Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/marp-presentation-builder:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
